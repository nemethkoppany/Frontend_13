<app-header></app-header>

<main>
  <ul id="users">
    @for(user of users; track user.id){
      <li>
        <app-user
        [user] = "user" 
        (select)="onSelectUser($event)"> 
        </app-user>
      </li>
    }
    </ul>


  @if(selectedUserId){
    <app-tasks [userId]="selectedUserId"></app-tasks>
  }
  @else{
    <p>Please select a user</p>
  }
  
</main>
