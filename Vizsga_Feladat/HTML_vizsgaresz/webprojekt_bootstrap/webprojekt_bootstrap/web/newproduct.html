<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Új alkatrész felvétele</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="newproductstyle.css">
</head>
<body>

<div class="container py-5">
    <h1 class="text-center mb-4">Új alkatrész felvétele</h1>

    <div class="row justify-content-center">
        <div class="col-12 col-md-6">

            <div class="mb-3">
                <label for="nev" class="form-label">Alkatrész neve</label>
                <input type="text" class="form-control" id="nev" name="nev">
            </div>

            <div class="mb-3">
                <label for="leiras" class="form-label">Leírás</label>
                <input type="text" class="form-control" id="leiras" name="leiras">
            </div>

            <div class="mb-3">
                <label for="keszlet" class="form-label">Készleten lévő darab</label>
                <input type="number" class="form-control" id="keszlet" name="keszlet">
            </div>

            <div class="mb-3">
                <label for="ar" class="form-label">Termék egységára</label>
                <input type="number" class="form-control" id="ar" name="ar">
            </div>

            <div class="mb-3">
                <label for="kep" class="form-label">Fénykép az alkatrészről</label>
                <input type="text" class="form-control" id="kep" name="kep">
            </div>

            <div class="text-center mt-4">
                <button type="button" class="btn btn-primary rounded-pill px-4">Felvétel</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
